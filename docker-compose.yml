version: "3.9"

services:
  ssh-shell-mcp:
    build: .
    container_name: ssh-shell-mcp
    restart: unless-stopped
    ports:
      - "8010:8000"
    volumes:
      # Mount your SSH keys read-only
      - "${HOME}/.ssh:/root/.ssh:ro"
      # Persist audit logs
      - ./logs:/app/logs
      # Edit hosts/policies without rebuilding
      - ./config:/app/config
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - SSH_HOSTS_YAML=/app/config/hosts.yaml
      - SSH_POLICIES_YAML=/app/config/policies.yaml
      - SSH_MCP_LOG_DIR=/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Optional: stdio transport (for Claude Desktop direct integration) ──
  # Uncomment and adjust claude_desktop_config.json accordingly
  # ssh-shell-mcp-stdio:
  #   build: .
  #   container_name: ssh-shell-mcp-stdio
  #   volumes:
  #     - "${HOME}/.ssh:/root/.ssh:ro"
  #     - ./logs:/app/logs
  #     - ./config:/app/config
  #   command: ["--transport", "stdio"]
  #   stdin_open: true
  #   tty: true
